<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon - Site Under Construction</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            color: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
        }

        .container {
            text-align: center;
            z-index: 10;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h1 {
            font-size: 4rem;
            margin: 0;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.7);
            animation: fadeInUp 2s ease-in-out;
            background: linear-gradient(45deg, #ff6b6b, #feca57, #48cae4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p {
            font-size: 1.8rem;
            margin-top: 20px;
            animation: fadeInUp 3s ease-in-out;
            opacity: 0.9;
        }

        footer {
            position: absolute;
            bottom: 20px;
            text-align: center;
            font-size: 1.2rem;
            opacity: 0.8;
            animation: fadeInUp 4s ease-in-out;
            z-index: 10;
        }

        /* Paint Animation - Enhanced */
        .paint-drop {
            position: absolute;
            width: 30px;
            height: 30px;
            background: radial-gradient(circle, rgba(255, 107, 107, 0.8), rgba(254, 202, 87, 0.8));
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
            animation: drip 5s infinite ease-in-out;
        }

        .paint-drop:nth-child(1) { top: 10%; left: 20%; animation-delay: 0s; }
        .paint-drop:nth-child(2) { top: 15%; left: 70%; animation-delay: 0.5s; background: radial-gradient(circle, rgba(72, 202, 228, 0.8), rgba(255, 107, 107, 0.8)); }
        .paint-drop:nth-child(3) { top: 25%; left: 40%; animation-delay: 1s; }
        .paint-drop:nth-child(4) { top: 35%; left: 10%; animation-delay: 1.5s; background: radial-gradient(circle, rgba(254, 202, 87, 0.8), rgba(72, 202, 228, 0.8)); }
        .paint-drop:nth-child(5) { top: 45%; left: 80%; animation-delay: 2s; }
        .paint-drop:nth-child(6) { top: 55%; left: 30%; animation-delay: 2.5s; background: radial-gradient(circle, rgba(255, 107, 107, 0.8), rgba(254, 202, 87, 0.8)); }
        .paint-drop:nth-child(7) { top: 65%; left: 60%; animation-delay: 3s; }
        .paint-drop:nth-child(8) { top: 75%; left: 15%; animation-delay: 3.5s; background: radial-gradient(circle, rgba(72, 202, 228, 0.8), rgba(255, 107, 107, 0.8)); }

        @keyframes drip {
            0% { transform: translateY(-150px) scale(1) rotate(0deg); opacity: 1; }
            25% { transform: translateY(50px) scale(1.3) rotate(90deg); opacity: 0.9; }
            50% { transform: translateY(200px) scale(1.5) rotate(180deg); opacity: 0.7; }
            75% { transform: translateY(350px) scale(1.2) rotate(270deg); opacity: 0.5; }
            100% { transform: translateY(500px) scale(0.8) rotate(360deg); opacity: 0; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Floating particles for extra beauty */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            animation: float 8s infinite ease-in-out;
        }

        .particle:nth-child(9) { top: 20%; left: 50%; animation-delay: 0s; }
        .particle:nth-child(10) { top: 40%; left: 25%; animation-delay: 2s; }
        .particle:nth-child(11) { top: 60%; left: 75%; animation-delay: 4s; }
        .particle:nth-child(12) { top: 80%; left: 45%; animation-delay: 6s; }

        @keyframes float {
            0%, 100% { transform: translateY(0px) translateX(0px); opacity: 0.6; }
            50% { transform: translateY(-20px) translateX(10px); opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- Paint Drops -->
    <div class="paint-drop"></div>
    <div class="paint-drop"></div>
    <div class="paint-drop"></div>
    <div class="paint-drop"></div>
    <div class="paint-drop"></div>
    <div class="paint-drop"></div>
    <div class="paint-drop"></div>
    <div class="paint-drop"></div>

    <!-- Floating Particles -->
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>

    <!-- Main Content -->
    <div class="container">
        <h1>Coming Soon</h1>
        <p>Site Under Construction</p>
    </div>

    <!-- Footer -->
    <footer>
        🎨 Vianna's Creative Space is Coming 🚀
    </footer>
</body>
</html>
